<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S9N Power Dialer</title>
  <script src="https://cdn.jsdelivr.net/npm/@telnyx/webrtc@latest/lib/bundle.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e2e8f0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 24px 16px;
    }
    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; margin-bottom: 4px; }
    .subtitle { font-size: .8rem; color: #64748b; margin-bottom: 24px; }
    .card {
      background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
      padding: 20px; width: 100%; max-width: 540px; margin-bottom: 16px;
    }
    .card-title {
      font-size: .7rem; text-transform: uppercase; letter-spacing: 1px;
      color: #64748b; margin-bottom: 12px;
    }
    #status-bar { display: flex; align-items: center; gap: 10px; font-size: .85rem; margin-bottom: 16px; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444; flex-shrink: 0; transition: background .3s;
    }
    #status-dot.ready   { background: #22c55e; }
    #status-dot.calling { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    #contact-info { display: none; }
    #contact-name  { font-size: 1.2rem; font-weight: 700; }
    #contact-phone { font-size: .85rem; color: #94a3b8; margin-top: 2px; }
    #contact-meta  { font-size: .75rem; color: #64748b; margin-top: 6px; }
    #queue-stats   { font-size: .8rem; color: #64748b; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      padding: 10px 18px; border-radius: 8px; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .35; cursor: not-allowed; }
    .btn-green  { background: #22c55e; color: #000; }
    .btn-red    { background: #ef4444; color: #fff; }
    .btn-orange { background: #f59e0b; color: #000; }
    .btn-slate  { background: #334155; color: #e2e8f0; }
    .btn-blue   { background: #3b82f6; color: #fff; }
    #amd-badge {
      display: none; margin-top: 10px;
      font-size: .75rem; font-weight: 700; letter-spacing: .5px;
      padding: 4px 10px; border-radius: 6px; width: fit-content;
    }
    #amd-badge.human     { background: #166534; color: #bbf7d0; }
    #amd-badge.machine   { background: #7c2d12; color: #fed7aa; }
    #amd-badge.no-answer { background: #1e3a5f; color: #bae6fd; }
    select, textarea, input[type=text] {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      background: #0f1117; border: 1px solid #2d3348;
      color: #e2e8f0; font-size: .85rem; margin-top: 6px;
    }
    textarea { resize: vertical; min-height: 64px; }
    label { font-size: .75rem; color: #94a3b8; }
    #call-log { max-height: 180px; overflow-y: auto; font-size: .75rem; color: #64748b; }
    #call-log .entry { padding: 4px 0; border-bottom: 1px solid #1e2130; }
    #call-log .entry span { font-weight: 600; color: #94a3b8; }
    #upload-area { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
    #upload-textarea { height: 80px; flex: 1; min-width: 220px; }
    .status-msg { font-size: .75rem; color: #64748b; margin-top: 6px; }
    #balance-display { font-size: 1rem; font-weight: 700; color: #22c55e; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<h1>S9N Power Dialer</h1>
<p class="subtitle">Telnyx Edition</p>

<div class="card">
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connecting…</span>
    <span style="margin-left:auto;font-size:.75rem" id="balance-display"></span>
  </div>
  <div id="queue-stats">Queue: loading…</div>
</div>

<div class="card" id="contact-info">
  <div class="card-title">Current Contact</div>
  <div id="contact-name">—</div>
  <div id="contact-phone">—</div>
  <div id="contact-meta">—</div>
  <div id="amd-badge"></div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn-green"  id="btn-start-session" onclick="startSession()" disabled>Start Session</button>
    <button class="btn-green"  id="btn-dial"          onclick="dialCurrent()"  disabled>Dial</button>
    <button class="btn-orange" id="btn-skip"          onclick="skipContact()"  disabled>Skip</button>
    <button class="btn-orange" id="btn-hangup-out"    onclick="hangupOutbound()" disabled>Hang Up Contact</button>
    <button class="btn-red"    id="btn-end-session"   onclick="endSession()"   disabled>End Session</button>
  </div>
</div>

<div class="card hidden" id="disposition-card">
  <div class="card-title">Disposition</div>
  <label>Outcome
    <select id="disp-status">
      <option value="connected">Connected</option>
      <option value="voicemail">Voicemail</option>
      <option value="no_answer">No Answer</option>
      <option value="busy">Busy</option>
      <option value="wrong_number">Wrong Number</option>
      <option value="not_in_service">Not in Service</option>
      <option value="do_not_contact">Do Not Contact</option>
    </select>
  </label>
  <label style="margin-top:8px">Sentiment
    <select id="disp-sentiment">
      <option value="">— (none)</option>
      <option value="interested">Interested</option>
      <option value="callback">Callback</option>
      <option value="no_interest">No Interest</option>
      <option value="bad_fit">Bad Fit</option>
    </select>
  </label>
  <label style="margin-top:8px">Notes
    <textarea id="disp-notes" placeholder="Optional notes…"></textarea>
  </label>
  <div class="btn-row" style="margin-top:12px">
    <button class="btn-blue"  onclick="submitDisposition()">Save &amp; Next</button>
    <button class="btn-slate" onclick="skipDisposition()">Skip</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Upload Contacts (JSON array)</div>
  <div id="upload-area">
    <textarea id="upload-textarea" placeholder='[{"firstName":"Jane","lastName":"Doe","phone":"+12125550001","company":"Acme"}]'></textarea>
    <button class="btn-slate" onclick="uploadContacts()">Upload</button>
  </div>
  <div class="status-msg" id="upload-status"></div>
</div>

<div class="card">
  <div class="card-title">Lemlist Campaign</div>
  <div class="btn-row">
    <input type="text" id="lemlist-campaign-id" placeholder="Campaign ID" style="flex:1" />
    <button class="btn-slate" onclick="loadLemlist()">Load</button>
  </div>
  <div class="status-msg" id="lemlist-status"></div>
</div>

<div class="card">
  <div class="card-title">Recent Calls</div>
  <div id="call-log"><div class="entry" style="color:#334155">No calls yet this session.</div></div>
</div>

<script>
const BASE = window.FUNCTION_URL || '';

let telnyxClient  = null;
let browserCall   = null;
let confName      = null;
let contacts      = [];
let currentIdx    = 0;
let outboundSid   = null;
let amdPollTimer  = null;
let sessionActive = false;
let submitting    = false;

window.addEventListener('DOMContentLoaded', async () => {
  await restoreState();
  await loadContacts();
  await fetchBalance();
  await initTelnyx();
});

async function initTelnyx() {
  setStatus('Fetching token…', false);
  let token;
  try { const r = await api('/token'); token = r.token; }
  catch (e) { setStatus('Token error: ' + e.message, false); return; }

  telnyxClient = new TelnyxRTC({ login_token: token });

  telnyxClient.on('telnyx.ready', () => {
    setStatus('Ready — click Start Session', true);
    setBtn('btn-start-session', false);
  });

  telnyxClient.on('telnyx.error', err => {
    setStatus('SDK error: ' + (err.message || JSON.stringify(err)), false);
  });

  telnyxClient.on('telnyx.notification', notification => {
    const call = notification.call;
    if (!call) return;
    if (browserCall && call.id !== browserCall.id) return;
    browserCall = call;

    if (call.state === 'ringing') {
      setStatus('Connecting to conference…', true, true);
    }
    if (call.state === 'active') {
      sessionActive = true;
      setStatus('Session active — click Dial', true);
      setBtn('btn-start-session', true);
      setBtn('btn-dial', false);
      setBtn('btn-skip', false);
      setBtn('btn-end-session', false);
    }
    if (call.state === 'hangup' || call.state === 'destroy') {
      browserCall = null; sessionActive = false; outboundSid = null;
      stopAmdPoll();
      setStatus('Session ended', true);
      setBtn('btn-start-session', false);
      setBtn('btn-dial', true);
      setBtn('btn-skip', true);
      setBtn('btn-hangup-out', true);
      setBtn('btn-end-session', true);
      hideAmdBadge();
      hideDispositionCard();
    }
  });

  telnyxClient.connect();
}

async function startSession() {
  if (!telnyxClient) { alert('SDK not ready yet'); return; }
  if (sessionActive) return;
  confName = 'pd_' + Math.random().toString(36).slice(2, 10);
  setStatus('Joining conference…', true, true);
  setBtn('btn-start-session', true);
  browserCall = telnyxClient.newCall({
    destinationNumber: 'sip:' + confName + '@sip.telnyx.com',
    callerNumber: '',
  });
}

async function endSession() {
  stopAmdPoll();
  if (outboundSid) {
    await api('/hangup_outbound', { outboundSid }).catch(() => {});
    outboundSid = null;
  }
  if (browserCall) { try { browserCall.hangup(); } catch (_) {} browserCall = null; }
  sessionActive = false;
  setStatus('Session ended', true);
  setBtn('btn-start-session', false);
  setBtn('btn-dial', true);
  setBtn('btn-skip', true);
  setBtn('btn-hangup-out', true);
  setBtn('btn-end-session', true);
}

async function dialCurrent() {
  if (!sessionActive) { alert('Start a session first'); return; }
  const contact = contacts[currentIdx];
  if (!contact) { alert('No more contacts in queue'); return; }
  setStatus('Dialing ' + contact.phone + '…', true, true);
  setBtn('btn-dial', true);
  hideAmdBadge();
  hideDispositionCard();
  try {
    const r = await api('/dial_out', { to: contact.phone, confName });
    if (r.error) { setStatus('Dial error: ' + r.error, true); setBtn('btn-dial', false); return; }
    outboundSid = r.outboundSid;
    setBtn('btn-hangup-out', false);
    startAmdPoll();
  } catch (e) {
    setStatus('Dial error: ' + e.message, true);
    setBtn('btn-dial', false);
  }
}

async function hangupOutbound() {
  stopAmdPoll();
  if (!outboundSid) return;
  await api('/hangup_outbound', { outboundSid }).catch(() => {});
  outboundSid = null;
  setBtn('btn-hangup-out', true);
  setBtn('btn-dial', false);
  showDispositionCard();
}

async function skipContact() {
  stopAmdPoll();
  if (outboundSid) {
    await api('/hangup_outbound', { outboundSid }).catch(() => {});
    outboundSid = null;
  }
  hideAmdBadge(); hideDispositionCard();
  await advanceContact();
  setBtn('btn-dial', sessionActive ? false : true);
  if (sessionActive && contacts[currentIdx]) await dialCurrent();
}

function startAmdPoll() {
  stopAmdPoll();
  let ticks = 0;
  amdPollTimer = setInterval(async () => {
    ticks++;
    if (ticks > 30) { stopAmdPoll(); return; }
    try {
      const r = await api('/amd_result');
      if (r.outboundSid && outboundSid && r.outboundSid !== outboundSid) return;
      if (r.state === 'human') {
        stopAmdPoll();
        showAmdBadge('human');
        setStatus('Human answered', true);
        setBtn('btn-dial', true); setBtn('btn-hangup-out', false);
      } else if (r.state === 'machine') {
        stopAmdPoll(); showAmdBadge('machine');
        await autoDispose('voicemail');
      } else if (r.state === 'no_answer') {
        stopAmdPoll(); showAmdBadge('no-answer');
        await autoDispose('no_answer');
      } else if (r.state === 'ended') {
        stopAmdPoll();
        outboundSid = null;
        setBtn('btn-hangup-out', true); setBtn('btn-dial', true);
        setStatus('Call ended — log disposition', true);
        showDispositionCard();
      }
    } catch (_) {}
  }, 2000);
}

function stopAmdPoll() {
  if (amdPollTimer) { clearInterval(amdPollTimer); amdPollTimer = null; }
}

async function autoDispose(disposition) {
  const label = disposition === 'voicemail' ? 'Voicemail' : 'No answer';
  setStatus(label + ' — advancing in 2s…', true);
  const contact = contacts[currentIdx] || {};
  try {
    await api('/update', {
      index: currentIdx, status: disposition, disposition, sentiment: '', notes: '',
      phone: contact.phone, firstName: contact.firstName, lastName: contact.lastName,
      lemlistCampaignId: contact.lemlistCampaignId,
      lemlistLeadId: contact.lemlistLeadId, lemlistTaskId: contact.lemlistTaskId,
    });
    addLogEntry(contact, disposition, '');
  } catch (_) {}
  outboundSid = null;
  setBtn('btn-hangup-out', true);
  await delay(2000);
  hideAmdBadge();
  await advanceContact();
  if (sessionActive && contacts[currentIdx]) await dialCurrent();
}

async function advanceContact() {
  currentIdx++;
  await saveState();
  renderContact();
  setBtn('btn-dial', sessionActive ? false : true);
}

async function restoreState() {
  try { const r = await api('/resume_state'); if (r.currentIdx !== undefined) currentIdx = r.currentIdx; }
  catch (_) {}
}
async function saveState() {
  try { await api('/resume_state', { currentIdx }); } catch (_) {}
}

async function loadContacts() {
  try {
    contacts = await api('/contacts');
    renderContact();
    document.getElementById('queue-stats').textContent =
      contacts.length ? 'Queue: ' + contacts.length + ' pending' : 'Queue: empty';
  } catch (_) {
    document.getElementById('queue-stats').textContent = 'Queue: error loading';
  }
}

function renderContact() {
  const contact = contacts[currentIdx];
  const infoEl  = document.getElementById('contact-info');
  if (!contact) {
    infoEl.style.display = 'none';
    document.getElementById('queue-stats').textContent =
      currentIdx > 0 ? 'Queue: complete ✓' : 'Queue: empty — upload contacts';
    return;
  }
  infoEl.style.display = 'block';
  document.getElementById('contact-name').textContent =
    [contact.firstName, contact.lastName].filter(Boolean).join(' ') || '(no name)';
  document.getElementById('contact-phone').textContent = contact.phone || '—';
  document.getElementById('contact-meta').textContent =
    [contact.company, contact.title, contact.location].filter(Boolean).join(' · ') || '';
  document.getElementById('queue-stats').textContent =
    'Queue: ' + (currentIdx + 1) + ' / ' + contacts.length;
}

function showDispositionCard() { document.getElementById('disposition-card').classList.remove('hidden'); }
function hideDispositionCard() { document.getElementById('disposition-card').classList.add('hidden'); }

async function submitDisposition() {
  if (submitting) return;
  submitting = true;
  const contact   = contacts[currentIdx] || {};
  const status    = document.getElementById('disp-status').value;
  const sentiment = document.getElementById('disp-sentiment').value;
  const notes     = document.getElementById('disp-notes').value;
  try {
    await api('/update', {
      index: currentIdx, status, disposition: status, sentiment, notes,
      phone: contact.phone, firstName: contact.firstName, lastName: contact.lastName,
      lemlistCampaignId: contact.lemlistCampaignId,
      lemlistLeadId: contact.lemlistLeadId, lemlistTaskId: contact.lemlistTaskId,
    });
    addLogEntry(contact, status, sentiment);
  } catch (e) { alert('Save error: ' + e.message); }
  submitting = false;
  document.getElementById('disp-notes').value = '';
  document.getElementById('disp-sentiment').value = '';
  hideDispositionCard(); hideAmdBadge();
  await advanceContact();
  if (sessionActive && contacts[currentIdx]) await dialCurrent();
}

async function skipDisposition() {
  hideDispositionCard(); hideAmdBadge();
  await advanceContact();
  if (sessionActive && contacts[currentIdx]) await dialCurrent();
}

function addLogEntry(contact, status, sentiment) {
  const log   = document.getElementById('call-log');
  const entry = document.createElement('div');
  entry.className = 'entry';
  const name = [contact.firstName, contact.lastName].filter(Boolean).join(' ') || contact.phone;
  entry.innerHTML = '<span>' + name + '</span> — ' + status +
    (sentiment ? ' / ' + sentiment : '') +
    ' <small style="color:#475569">' + new Date().toLocaleTimeString() + '</small>';
  const placeholder = log.querySelector('[style*="334155"]');
  if (placeholder) log.innerHTML = '';
  log.prepend(entry);
}

async function uploadContacts() {
  const raw = document.getElementById('upload-textarea').value.trim();
  const el  = document.getElementById('upload-status');
  let parsed;
  try { parsed = JSON.parse(raw); } catch (_) { el.textContent = 'Invalid JSON'; return; }
  if (!Array.isArray(parsed)) { el.textContent = 'Must be a JSON array'; return; }
  el.textContent = 'Uploading…';
  try {
    const r = await api('/upload', { contacts: JSON.stringify(parsed) });
    el.textContent = 'Uploaded: ' + r.added + ' added, ' + r.skipped + ' skipped (blacklisted).';
    currentIdx = 0;
    await loadContacts();
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function loadLemlist() {
  const campaignId = document.getElementById('lemlist-campaign-id').value.trim();
  const el = document.getElementById('lemlist-status');
  if (!campaignId) { el.textContent = 'Enter a campaign ID'; return; }
  el.textContent = 'Loading from Lemlist…';
  try {
    const r = await api('/lemlist_contacts?campaignId=' + encodeURIComponent(campaignId));
    if (!r.success) { el.textContent = 'Error: ' + r.error; return; }
    if (!r.contacts || !r.contacts.length) { el.textContent = 'No phone contacts found.'; return; }
    const up = await api('/upload', { contacts: JSON.stringify(r.contacts) });
    el.textContent = 'Loaded ' + up.added + ' contacts from Lemlist (' + up.skipped + ' skipped).';
    currentIdx = 0;
    await loadContacts();
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function fetchBalance() {
  try {
    const r = await api('/balance');
    if (r.balance !== undefined)
      document.getElementById('balance-display').textContent =
        '$' + parseFloat(r.balance).toFixed(2) + ' ' + (r.currency || 'USD');
  } catch (_) {}
}

function setStatus(text, ready, calling) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').className = calling ? 'calling' : (ready ? 'ready' : '');
}
function setBtn(id, disabled) { const el = document.getElementById(id); if (el) el.disabled = !!disabled; }
function showAmdBadge(type) {
  const el = document.getElementById('amd-badge');
  el.style.display = 'block'; el.className = type;
  el.textContent = type === 'human' ? 'HUMAN ANSWERED' : type === 'machine' ? 'VOICEMAIL / MACHINE' : 'NO ANSWER';
}
function hideAmdBadge() { const el = document.getElementById('amd-badge'); el.style.display = 'none'; el.className = ''; }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function api(path, body) {
  const opts = body
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    : { method: 'GET' };
  const r = await fetch(BASE + path, opts);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}
</script>
</body>
</html>
