name: Deploy to Telnyx Edge Compute

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install telnyx-edge CLI
        run: |
          curl -sL "https://github.com/team-telnyx/edge-compute/releases/download/v0.2.2/telnyx-edge-v0.2.2-linux-amd64.tar.gz" \
            -o /tmp/te.tar.gz
          tar -xz -C /tmp/ -f /tmp/te.tar.gz
          sudo mv /tmp/telnyx-edge-v0.2.2-linux-amd64/telnyx-edge /usr/local/bin/telnyx-edge
          chmod +x /usr/local/bin/telnyx-edge
          telnyx-edge --version || true

      - name: Authenticate
        env:
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
        run: telnyx-edge auth api-key set "$TELNYX_API_KEY"

      - name: Push secrets to Edge function
        env:
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_ACCOUNT_SID: ${{ secrets.TELNYX_ACCOUNT_SID }}
          TELNYX_CREDENTIAL_ID: ${{ secrets.TELNYX_CREDENTIAL_ID }}
          FROM_NUMBER: ${{ secrets.FROM_NUMBER }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
        run: |
          telnyx-edge secrets add TELNYX_API_KEY "$TELNYX_API_KEY"
          sleep 5
          telnyx-edge secrets add TELNYX_ACCOUNT_SID "$TELNYX_ACCOUNT_SID"
          sleep 5
          telnyx-edge secrets add TELNYX_CREDENTIAL_ID "$TELNYX_CREDENTIAL_ID"
          sleep 5
          telnyx-edge secrets add FROM_NUMBER "$FROM_NUMBER"
          sleep 5
          telnyx-edge secrets add UPSTASH_REDIS_URL "$UPSTASH_REDIS_URL"
          sleep 5
          telnyx-edge secrets add UPSTASH_REDIS_TOKEN "$UPSTASH_REDIS_TOKEN"

      - name: Deploy
        env:
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
        run: |
          # Ensure func.toml has [edge_compute] section with func_id.
          # On first deploy the function doesn't exist yet — create it via API.
          if ! grep -q '\[edge_compute\]' func.toml; then
            echo "No [edge_compute] section found — creating function via API..."
            RESPONSE=$(curl -s -X POST "https://api.telnyx.com/v2/compute/funcs" \
              -H "Authorization: Bearer $TELNYX_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"func_name":"s9n-dialer","language":"js"}')
            echo "API response: $RESPONSE"
            FUNC_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('id', d.get('data',{}).get('func_id','')))" 2>/dev/null)
            if [ -z "$FUNC_ID" ]; then
              echo "Failed to create function or parse func_id"
              exit 1
            fi
            echo "Got func_id: $FUNC_ID"
            printf '\n[edge_compute]\nfunc_id = "%s"\nfunc_name = "s9n-dialer"\n' "$FUNC_ID" >> func.toml
          fi
          telnyx-edge ship
