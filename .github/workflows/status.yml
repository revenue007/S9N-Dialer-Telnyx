name: Check Edge Compute Status

on:
  workflow_dispatch: {}

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Install telnyx-edge CLI
        run: |
          curl -sL "https://github.com/team-telnyx/edge-compute/releases/download/v0.2.2/telnyx-edge-v0.2.2-linux-amd64.tar.gz" \
            -o /tmp/te.tar.gz
          tar -xz -C /tmp/ -f /tmp/te.tar.gz
          sudo mv /tmp/telnyx-edge-v0.2.2-linux-amd64/telnyx-edge /usr/local/bin/telnyx-edge
          chmod +x /usr/local/bin/telnyx-edge

      - name: Authenticate
        env:
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
        run: telnyx-edge auth api-key set "$TELNYX_API_KEY"

      - name: List functions
        run: telnyx-edge list

      - name: Revisions
        run: telnyx-edge revisions list s9n-dialer -v
